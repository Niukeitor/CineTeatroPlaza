<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Cine Teatro Plaza</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        .auth-container {
            display: flex; height: 100vh; align-items: center; justify-content: center; background: #0b0f19; padding: 20px;
        }
        .auth-card {
            background: var(--card-bg); padding: 50px 40px; border-radius: 12px; width: 100%; max-width: 420px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.05); text-align: center;
        }
        .auth-card h2 { color: white; margin-bottom: 30px; font-size: 28px; }
        .auth-group { margin-bottom: 20px; text-align: left; }
        .auth-group label { display: block; margin-bottom: 8px; color: var(--text-secondary); font-size: 14px; font-weight: 600;}
        .auth-group input { width: 100%; padding: 14px; border-radius: 8px; background: #0f1523; border: 1px solid #334155; color: white; font-family: 'Outfit'; box-sizing: border-box;}
        .auth-group input:focus { border-color: var(--accent-color); outline: none; }
        .auth-btn { width: 100%; padding: 14px; background: var(--accent-color); color: white; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 16px; margin-bottom: 20px; transition: 0.3s; }
        .auth-btn:hover { background: #0284c7; transform: scale(1.02); }
        .auth-toggle { background: transparent; border: none; color: var(--text-secondary); cursor: pointer; text-decoration: underline; margin-bottom: 25px; font-family: 'Outfit'; }
        
        .divider { display: flex; align-items: center; margin: 25px 0; color: var(--text-secondary); font-size: 14px; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #334155; }
        .divider::before { margin-right: 15px; }
        .divider::after { margin-left: 15px; }
        
        .back-link { display: inline-block; margin-top: 30px; color: var(--text-secondary); text-decoration: none; font-size: 14px; transition: 0.3s;}
        .back-link:hover { color: white; }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- VISTA DE LOGIN -->
        <div class="auth-card" id="login-view">
            <h2>Iniciar Sesión</h2>
            <form id="login-form">
                <div class="auth-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="login-email" placeholder="cineasta@gmail.com" required>
                </div>
                <div class="auth-group">
                    <label>Contraseña</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="auth-btn">Acceder</button>
            </form>
            <button class="auth-toggle" onclick="toggleView('register')">¿No tienes cuenta? Crea una gratis</button>

            <div class="divider">Ingreso rápido con Google</div>
            <div style="display:flex; justify-content:center;">
                <div id="g_id_onload"
                     data-client_id="91767642995-21af6j0npll7f858ps31jp5d8k2iu2cm.apps.googleusercontent.com"
                     data-callback="handleCredentialResponse">
                </div>
                <!-- data-width forza al boton de google a ser del ancho de la carta -->
                <div class="g_id_signin" data-type="standard" data-theme="dark" data-size="large" data-width="340"></div>
            </div>
            
            <a href="index.html" class="back-link">← Volver a la Cartelera</a>
        </div>

        <!-- VISTA DE REGISTRO -->
        <div class="auth-card" id="register-view" style="display:none;">
            <h2>Crear Cuenta</h2>
            <form id="register-form">
                <div class="auth-group">
                    <label>Nombre Completo</label>
                    <input type="text" id="reg-name" placeholder="John Doe" required>
                </div>
                <div class="auth-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="reg-email" placeholder="john@doe.com" required>
                </div>
                <div class="auth-group">
                    <label>Contraseña</label>
                    <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" required minlength="6">
                </div>
                <button type="submit" class="auth-btn">Registrarse</button>
            </form>
            <button class="auth-toggle" onclick="toggleView('login')">¿Ya tienes cuenta? Ingresa aquí</button>
            
            <a href="index.html" class="back-link">← Volver a la Cartelera</a>
        </div>
    </div>
    
    <script src="auth.js"></script>
</body>
</html>
